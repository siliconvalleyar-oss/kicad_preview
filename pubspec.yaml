name: kicad_preview
description: "Professional KiCad file previewer for schematics and PCB"
publish_to: 'none'
version: 1.0.7+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  provider: ^6.1.2
  collection: ^1.19.1
  path: ^1.9.1
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/files_kicad/
